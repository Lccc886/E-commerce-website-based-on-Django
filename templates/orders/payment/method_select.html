{% extends 'base.html' %}

{% block title %}选择支付方式 - LUMINA{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="mb-8">
        <a href="{% url 'users:profile' %}" class="text-sm text-gray-500 hover:text-black transition-colors">&larr; 返回订单</a>
    </div>

    <h1 class="text-3xl font-bold text-gray-900 mb-8">选择支付方式</h1>

    <!-- 订单信息 -->
    <div class="bg-gray-50 rounded-xl p-6 mb-8">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">订单信息</h2>
        <div class="space-y-2 text-sm">
            <div class="flex justify-between">
                <span class="text-gray-600">订单编号</span>
                <span class="text-gray-900">#{{ order.id }}</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-600">商品数量</span>
                <span class="text-gray-900">{{ order.items.count }} 件</span>
            </div>
            <div class="flex justify-between border-t border-gray-200 pt-2 mt-2">
                <span class="text-gray-900 font-semibold">支付金额</span>
                <span class="text-2xl font-bold text-red-500">${{ order.total_amount|floatformat:2 }}</span>
            </div>
        </div>
    </div>

    <!-- 支付方式选择 -->
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="space-y-3">
            <label class="flex items-center p-4 border-2 rounded-xl cursor-pointer hover:border-black transition-colors has-[:checked]:border-black has-[:checked]:bg-gray-50">
                <input type="radio" name="payment_method" value="alipay" checked class="mr-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19.5 3h-15A1.5 1.5 0 003 4.5v15A1.5 1.5 0 004.5 21h15a1.5 1.5 0 001.5-1.5v-15A1.5 1.5 0 0019.5 3zM12 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 12c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="font-semibold text-gray-900">支付宝</div>
                        <div class="text-sm text-gray-500">推荐使用支付宝扫码支付</div>
                    </div>
                </div>
            </label>

            <label class="flex items-center p-4 border-2 rounded-xl cursor-pointer hover:border-black transition-colors has-[:checked]:border-black has-[:checked]:bg-gray-50">
                <input type="radio" name="payment_method" value="wechat" class="mr-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-500 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178A1.17 1.17 0 014.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178 1.17 1.17 0 01-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 01.598.082l1.584.926a.272.272 0 00.14.046c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 01-.023-.156.49.49 0 01.201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-7.062-6.122zm-2.036 2.96c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.97-.982z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="font-semibold text-gray-900">微信支付</div>
                        <div class="text-sm text-gray-500">使用微信扫码支付</div>
                    </div>
                </div>
            </label>
        </div>

        <button type="submit" class="w-full bg-black text-white py-4 rounded-xl font-semibold hover:bg-gray-800 transition-colors mt-6">
            确认支付
        </button>
    </form>

    <!-- 提示信息 -->
    <div class="mt-6 p-4 bg-yellow-50 rounded-lg">
        <p class="text-sm text-yellow-800">
            <span class="font-semibold">模拟沙箱提示：</span>
            这是模拟支付环境，不会产生真实扣款。点击确认支付后将跳转到模拟支付页面。
        </p>
    </div>
</div>
{% endblock %}
