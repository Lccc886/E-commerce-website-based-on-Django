<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据可视化大屏 - LUMINA</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .dashboard {
            padding: 20px;
            max-width: 1920px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px 0 30px;
            position: relative;
        }

        .header h1 {
            font-size: 36px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
        }

        .header .time {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #a0d2ff;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .stat-card .title {
            font-size: 14px;
            color: #a0d2ff;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .subtitle {
            font-size: 12px;
            color: #6b7c93;
            margin-top: 5px;
        }

        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-container .chart-title {
            font-size: 16px;
            margin-bottom: 15px;
            color: #a0d2ff;
            padding-left: 10px;
            border-left: 3px solid #3a7bd5;
        }

        .chart-container .chart {
            height: 300px;
        }

        .bottom-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .product-list {
            max-height: 320px;
            overflow-y: auto;
        }

        .product-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-rank {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            margin-right: 15px;
        }

        .product-rank.top3 {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .product-name {
            flex: 1;
            font-size: 14px;
        }

        .product-sales {
            color: #00d2ff;
            font-weight: bold;
        }

        @media (max-width: 1200px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
            .bottom-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard" x-data="dashboardApp()" x-init="init()">
        <div class="header">
            <h1>LUMINA 商城数据大屏</h1>
            <div class="time" x-text="currentTime"></div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="title">今日订单</div>
                <div class="value" x-text="stats.today.order_count"></div>
                <div class="subtitle">金额: $<span x-text="stats.today.order_amount.toFixed(2)"></span></div>
            </div>
            <div class="stat-card">
                <div class="title">今日支付</div>
                <div class="value" x-text="stats.today.paid_count"></div>
                <div class="subtitle">金额: $<span x-text="stats.today.paid_amount.toFixed(2)"></span></div>
            </div>
            <div class="stat-card">
                <div class="title">今日新用户</div>
                <div class="value" x-text="stats.today.new_users"></div>
                <div class="subtitle">累计: <span x-text="stats.total.users"></span></div>
            </div>
            <div class="stat-card">
                <div class="title">商品总数</div>
                <div class="value" x-text="stats.total.products"></div>
                <div class="subtitle">累计订单: <span x-text="stats.total.order_count"></span></div>
            </div>
        </div>

        <!-- 图表行 -->
        <div class="charts-row">
            <div class="chart-container">
                <div class="chart-title">销售趋势（近7天）</div>
                <div id="salesChart" class="chart"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">订单状态分布</div>
                <div id="statusChart" class="chart"></div>
            </div>
        </div>

        <!-- 底部图表 -->
        <div class="bottom-row">
            <div class="chart-container">
                <div class="chart-title">热销商品 TOP 10</div>
                <div class="product-list">
                    <template x-for="(product, index) in topProducts" :key="product.id">
                        <div class="product-item">
                            <div class="product-rank" :class="{'top3': index < 3}" x-text="index + 1"></div>
                            <div class="product-name" x-text="product.name"></div>
                            <div class="product-sales">销量: <span x-text="product.quantity"></span></div>
                        </div>
                    </template>
                </div>
            </div>
            <div class="chart-container">
                <div class="chart-title">分类销售分布</div>
                <div id="categoryChart" class="chart"></div>
            </div>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        function dashboardApp() {
            return {
                currentTime: '',
                stats: {
                    today: { order_count: 0, order_amount: 0, paid_count: 0, paid_amount: 0, new_users: 0 },
                    total: { order_count: 0, order_amount: 0, users: 0, products: 0 }
                },
                topProducts: [],
                salesChart: null,
                statusChart: null,
                categoryChart: null,

                init() {
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);

                    this.initCharts();
                    this.fetchData();

                    // 每30秒刷新数据
                    setInterval(() => this.fetchData(), 30000);
                },

                updateTime() {
                    const now = new Date();
                    this.currentTime = now.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                },

                initCharts() {
                    this.salesChart = echarts.init(document.getElementById('salesChart'));
                    this.statusChart = echarts.init(document.getElementById('statusChart'));
                    this.categoryChart = echarts.init(document.getElementById('categoryChart'));

                    window.addEventListener('resize', () => {
                        this.salesChart.resize();
                        this.statusChart.resize();
                        this.categoryChart.resize();
                    });
                },

                fetchData() {
                    // 实时统计
                    fetch('/analytics/api/realtime/')
                        .then(res => res.json())
                        .then(data => {
                            this.stats = data;
                        });

                    // 销售趋势
                    fetch('/analytics/api/sales-trend/')
                        .then(res => res.json())
                        .then(data => {
                            this.updateSalesChart(data);
                        });

                    // 订单状态
                    fetch('/analytics/api/order-status/')
                        .then(res => res.json())
                        .then(data => {
                            this.updateStatusChart(data);
                        });

                    // 热销商品
                    fetch('/analytics/api/top-products/')
                        .then(res => res.json())
                        .then(data => {
                            this.topProducts = data.products;
                        });

                    // 分类分布
                    fetch('/analytics/api/category-distribution/')
                        .then(res => res.json())
                        .then(data => {
                            this.updateCategoryChart(data);
                        });
                },

                updateSalesChart(data) {
                    const option = {
                        tooltip: {
                            trigger: 'axis',
                            backgroundColor: 'rgba(0,0,0,0.7)',
                            borderColor: '#3a7bd5',
                            textStyle: { color: '#fff' }
                        },
                        legend: {
                            data: ['订单数', '支付订单数'],
                            textStyle: { color: '#a0d2ff' },
                            top: 0
                        },
                        grid: {
                            left: '3%',
                            right: '4%',
                            bottom: '3%',
                            containLabel: true
                        },
                        xAxis: {
                            type: 'category',
                            data: data.dates,
                            axisLine: { lineStyle: { color: '#3a7bd5' } },
                            axisLabel: { color: '#a0d2ff' }
                        },
                        yAxis: {
                            type: 'value',
                            axisLine: { lineStyle: { color: '#3a7bd5' } },
                            axisLabel: { color: '#a0d2ff' },
                            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                        },
                        series: [
                            {
                                name: '订单数',
                                type: 'line',
                                smooth: true,
                                data: data.order_counts,
                                lineStyle: { color: '#00d2ff' },
                                itemStyle: { color: '#00d2ff' },
                                areaStyle: {
                                    color: {
                                        type: 'linear',
                                        x: 0, y: 0, x2: 0, y2: 1,
                                        colorStops: [
                                            { offset: 0, color: 'rgba(0,210,255,0.3)' },
                                            { offset: 1, color: 'rgba(0,210,255,0)' }
                                        ]
                                    }
                                }
                            },
                            {
                                name: '支付订单数',
                                type: 'line',
                                smooth: true,
                                data: data.paid_counts,
                                lineStyle: { color: '#f5576c' },
                                itemStyle: { color: '#f5576c' }
                            }
                        ]
                    };
                    this.salesChart.setOption(option);
                },

                updateStatusChart(data) {
                    const option = {
                        tooltip: {
                            trigger: 'item',
                            backgroundColor: 'rgba(0,0,0,0.7)',
                            borderColor: '#3a7bd5',
                            textStyle: { color: '#fff' }
                        },
                        series: [{
                            type: 'pie',
                            radius: ['40%', '70%'],
                            center: ['50%', '55%'],
                            avoidLabelOverlap: false,
                            label: {
                                show: true,
                                color: '#a0d2ff'
                            },
                            labelLine: {
                                lineStyle: { color: '#3a7bd5' }
                            },
                            itemStyle: {
                                borderRadius: 10,
                                borderColor: '#1a1a2e',
                                borderWidth: 2
                            },
                            data: data.data.map((item, index) => ({
                                name: item.status,
                                value: item.count,
                                itemStyle: {
                                    color: ['#3a7bd5', '#00d2ff', '#f5576c', '#f093fb', '#6b7c93'][index % 5]
                                }
                            }))
                        }]
                    };
                    this.statusChart.setOption(option);
                },

                updateCategoryChart(data) {
                    const option = {
                        tooltip: {
                            trigger: 'axis',
                            backgroundColor: 'rgba(0,0,0,0.7)',
                            borderColor: '#3a7bd5',
                            textStyle: { color: '#fff' },
                            axisPointer: { type: 'shadow' }
                        },
                        grid: {
                            left: '3%',
                            right: '4%',
                            bottom: '3%',
                            containLabel: true
                        },
                        xAxis: {
                            type: 'value',
                            axisLine: { lineStyle: { color: '#3a7bd5' } },
                            axisLabel: { color: '#a0d2ff' },
                            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                        },
                        yAxis: {
                            type: 'category',
                            data: data.categories,
                            axisLine: { lineStyle: { color: '#3a7bd5' } },
                            axisLabel: { color: '#a0d2ff' }
                        },
                        series: [{
                            type: 'bar',
                            data: data.sales,
                            barWidth: '60%',
                            itemStyle: {
                                borderRadius: [0, 4, 4, 0],
                                color: {
                                    type: 'linear',
                                    x: 0, y: 0, x2: 1, y2: 0,
                                    colorStops: [
                                        { offset: 0, color: '#3a7bd5' },
                                        { offset: 1, color: '#00d2ff' }
                                    ]
                                }
                            }
                        }]
                    };
                    this.categoryChart.setOption(option);
                }
            }
        }
    </script>
</body>
</html>
