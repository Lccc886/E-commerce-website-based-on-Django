{% extends 'merchant/base.html' %}

{% block title %}删除商品{% endblock %}
{% block page_title %}删除商品{% endblock %}
{% block products_active %}bg-gray-800 text-white{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="text-center mb-6">
            <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
            </div>
            <h3 class="text-lg font-medium text-gray-900">确认删除</h3>
            <p class="text-gray-500 mt-2">确定要删除商品"{{ product.name }}"吗？此操作不可撤销。</p>
        </div>

        <form method="post" class="flex justify-center gap-4">
            {% csrf_token %}
            <a href="{% url 'merchant:product_list' %}" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                取消
            </a>
            <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
                确认删除
            </button>
        </form>
    </div>
</div>
{% endblock %}
